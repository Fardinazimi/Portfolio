<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfilio developer</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script
      src="https://kit.fontawesome.com/94ee7b3ce3.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="./css/responsive.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <nav>
        <div class="left">Fardin's Portfolio</div>
        <div class="right">
          <ul>
            <li><i class="fa-solid fa-image"></i> <a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Contact me</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main>
      <!-- first section -->
      <section class="firstSection">
        <div class="leftSection">
          Hi, My name is <span class="purple">Fardin</span>
          <div>and i am a passianate</div>
          <!-- <div>Web Developer</div> -->
          <span id="element"></span>
        </div>
        <div class="rightSection">
          <!-- card 3D -->
          <div class="card">
            <div class="inner inner_1">side 1</div>
            <div class="inner inner_2">logo</div>
          </div>
        </div>
      </section>

      <!-- second section -->
      <section class="secondSection">
        <span class="text-gray"> What I have done so far</span>
        <h1>Work Experience</h1>
        <div class="box">
          <div class="vertical"></div>
          <div class="vertical"></div>
          <div class="vertical"></div>
          <div class="vertical"></div>
          <div class="vertical"></div>
          <div class="vertical"></div>
          <div class="vertical"></div>
          <div class="vertical"></div>
        </div>
      </section>
    </main>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <!-- <script>
      var typed = new Typed("#element", {
        strings: ["Web Developer", "Salesforce Admin", "Digital Marketer"],
        typeSpeed: 100,
      });
    </script> -->
    <script>
      var typed = new Typed("#element", {
        strings: [
          "Full Stack Web Developer",
          "Salesforce Admin",
          "Digital Marketer",
        ],
        typeSpeed: 100,
        backSpeed: 50, // Speed for deleting text
        backDelay: 1000, // Delay before starting to delete
        loop: true, // Makes it loop indefinitely
      });
    </script>
  </body>
</html>
